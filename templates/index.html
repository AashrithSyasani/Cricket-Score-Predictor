<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cricket Score Predictor</title>

    <style>

        *{
            box-sizing: border-box;
        }

        body {

            font-family: 'Segoe UI', sans-serif;

            background: linear-gradient(135deg, #1e90ff, #00b894);

            color: #fff;

            text-align: center;

            margin: 0;
            padding: 0;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
        }

        .container {

            background: rgba(0, 0, 0, 0.6);

            padding: 25px;

            width: 400px;

            border-radius: 15px;

            box-shadow: 0px 8px 20px rgba(0,0,0,0.4);
        }

        h2 {

            margin-bottom: 20px;

            font-size: 26px;

            letter-spacing: 1px;
        }

        label {

            font-size: 14px;

            display: block;

            margin-top: 12px;

            margin-bottom: 5px;

            text-align: left;

            color: #f1f1f1;
        }

        input, select {

            width: 100%;

            height: 40px;

            padding: 8px 12px;

            border-radius: 8px;

            border: none;

            font-size: 14px;

            outline: none;
        }

        button {

            margin-top: 20px;

            padding: 12px;

            width: 100%;

            border: none;

            border-radius: 8px;

            background: linear-gradient(135deg, #ff7675, #e84393);

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s ease;
        }

        button:hover {

            background: linear-gradient(135deg, #e17055, #d63031);
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>🏏 T20 Cricket Score Predictor</h2>

        <form action="/predict" method="post">

            <label>Runs Scored so far:</label>

            <input 
                type="number" 
                name="current_score" 
                min="0"
                placeholder="Enter current score"
                required
            >

            <label>Wickets Lost:</label>

            <select name="wickets" required>

                <option value="">Select Wickets</option>

                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>

            </select>

            <label>Overs Completed:</label>

            <input 
                type="number"
                name="overs"
                min="5"
                max="20"
                step="0.1"
                placeholder="Enter overs (5 - 20)"
                required
            >

            <label>Runs in Last 5 Overs:</label>

            <input 
                type="number" 
                name="last_5" 
                min="0"
                placeholder="Enter last 5 overs runs"
                required
            >

            <button type="submit">
                Predict Final Score
            </button>

        </form>

    </div>

</body>

</html>
